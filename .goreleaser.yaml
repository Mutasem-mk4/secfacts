# Axon GoReleaser Configuration
version: 2

project_name: axon

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/axon
    binary: axon
    ldflags:
      - -s -w
      - -X github.com/Mutasem-mk4/axon/pkg/version.Version={{.Version}}
      - -X github.com/Mutasem-mk4/axon/pkg/version.Commit={{.Commit}}
      - -X github.com/Mutasem-mk4/axon/pkg/version.Date={{.Date}}

archives:
  - format: tar.gz
    # Windows use zip
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - WHITE_PAPER.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: axon
    repository:
      owner: Mutasem-mk4
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/Mutasem-mk4/axon"
    description: "High-performance security evidence normalization & correlation engine"
    license: "Apache-2.0"
    install: |
      bin.install "axon"
      bash_completion.install "completions/axon.bash" => "axon"
      zsh_completion.install "completions/_axon" => "_axon"
      fish_completion.install "completions/axon.fish"
